name: Ops Batch Stats Incident Ticket

on:
  workflow_run:
    workflows: ["Ops Batch Stats Alerts"]
    types: [completed]
  workflow_dispatch:
    inputs:
      source_run_id:
        description: "Optional source run id to backfill from"
        required: false

concurrency:
  group: ops-batch-stats-incident-ticket-${{ github.event.workflow_run.id || github.event.inputs.source_run_id || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read
  issues: write

jobs:
  incident-ticket:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'failure')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Resolve source run
        id: source
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.source_run_id }}" ]; then
            echo "run_id=${{ github.event.inputs.source_run_id }}" >> "$GITHUB_OUTPUT"
          else
            echo "run_id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download evidence artifact from source run
        id: evidence
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ steps.source.outputs.run_id }}
        run: |
          set -euo pipefail
          API="https://api.github.com/repos/${{ github.repository }}"
          ARTIFACT_ID=$(
            curl -fsS -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "${API}/actions/runs/${RUN_ID}/artifacts" \
            | jq -r '.artifacts[] | select(.name | startswith("batch-telemetry-evidence-")) | .id' \
            | head -n1
          )

          if [ -z "${ARTIFACT_ID}" ] || [ "${ARTIFACT_ID}" = "null" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "No evidence artifact found for run ${RUN_ID}; fallback mode enabled"
            exit 0
          fi

          curl -fsS -L \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${API}/actions/artifacts/${ARTIFACT_ID}/zip" \
            -o evidence.zip

          unzip -o evidence.zip
          test -f batch-telemetry-evidence.json
          jq -e . batch-telemetry-evidence.json >/dev/null
          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Prepare incident payload
        id: incident
        env:
          RUN_ID: ${{ steps.source.outputs.run_id }}
          EVIDENCE_AVAILABLE: ${{ steps.evidence.outputs.available }}
        run: |
          set -euo pipefail
          if [ "${EVIDENCE_AVAILABLE}" = "true" ]; then
            jq -e '
              ((.status|type)=="string") and
              ((.action|type)=="string") and
              ((.reason|type)=="string") and
              ((.config.lookbackWindow|type)=="string") and
              ((.counts.failedError5xxOrUnexpected|type)=="number" or .counts.failedError5xxOrUnexpected == null) and
              ((.counts.failureBurstError|type)=="number" or .counts.failureBurstError == null)
            ' batch-telemetry-evidence.json >/dev/null

            STATUS=$(jq -r '.status' batch-telemetry-evidence.json)
            ACTION=$(jq -r '.action' batch-telemetry-evidence.json)
            REASON=$(jq -r '.reason' batch-telemetry-evidence.json)
            WINDOW=$(jq -r '.config.lookbackWindow' batch-telemetry-evidence.json)
            ERROR_FAILED=$(jq -r '.counts.failedError5xxOrUnexpected // 0' batch-telemetry-evidence.json)
            BURST=$(jq -r '.counts.failureBurstError // 0' batch-telemetry-evidence.json)
          else
            STATUS="critical"
            ACTION="investigate-artifact-gap"
            REASON="missing_evidence_artifact"
            WINDOW="unknown"
            ERROR_FAILED="0"
            BURST="0"
          fi

          DATE_KEY=$(date -u +%Y-%m-%d)
          REASON_KEY=$(printf "%s" "$REASON" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9._-' '-')

          TITLE="[OPS][batch-stats] ${STATUS} ${REASON} (${DATE_KEY})"
          DEDUP_KEY="ops-batch-stats|${REASON_KEY}|${DATE_KEY}"

          if [ "${#TITLE}" -gt 240 ]; then
            TITLE="${TITLE:0:237}..."
          fi

          {
            echo "title=${TITLE}"
            echo "dedup_key=${DEDUP_KEY}"
            echo "status=${STATUS}"
            echo "action=${ACTION}"
            echo "reason=${REASON}"
            echo "window=${WINDOW}"
            echo "error_failed=${ERROR_FAILED}"
            echo "burst=${BURST}"
            echo "run_id=${RUN_ID}"
            echo "evidence_available=${EVIDENCE_AVAILABLE:-false}"
          } >> "$GITHUB_OUTPUT"

      - name: Validate incident issue quality payload
        env:
          ISSUE_TITLE: ${{ steps.incident.outputs.title }}
          DEDUP_KEY: ${{ steps.incident.outputs.dedup_key }}
          STATUS: ${{ steps.incident.outputs.status }}
          ACTION: ${{ steps.incident.outputs.action }}
          REASON: ${{ steps.incident.outputs.reason }}
          WINDOW: ${{ steps.incident.outputs.window }}
          EVIDENCE_AVAILABLE: ${{ steps.incident.outputs.evidence_available }}
        run: |
          set -euo pipefail

          test -n "${ISSUE_TITLE}"
          test -n "${DEDUP_KEY}"
          test -n "${STATUS}"
          test -n "${ACTION}"
          test -n "${REASON}"
          test -n "${WINDOW}"
          test -n "${EVIDENCE_AVAILABLE}"

          case "${STATUS}" in
            critical|warning|degraded_observability|ok|config_error) ;;
            *)
              echo "Unsupported status: ${STATUS}"
              exit 1
              ;;
          esac

          if ! echo "${DEDUP_KEY}" | grep -Eq '^ops-batch-stats\|[a-z0-9._-]+\|[0-9]{4}-[0-9]{2}-[0-9]{2}$'; then
            echo "Invalid dedup key format: ${DEDUP_KEY}"
            exit 1
          fi

          if ! echo "${ISSUE_TITLE}" | grep -q '^\[OPS\]\[batch-stats\] '; then
            echo "Invalid title prefix: ${ISSUE_TITLE}"
            exit 1
          fi

      - name: Create or update incident issue
        uses: actions/github-script@v7
        env:
          ISSUE_TITLE: ${{ steps.incident.outputs.title }}
          DEDUP_KEY: ${{ steps.incident.outputs.dedup_key }}
          STATUS: ${{ steps.incident.outputs.status }}
          ACTION: ${{ steps.incident.outputs.action }}
          REASON: ${{ steps.incident.outputs.reason }}
          WINDOW: ${{ steps.incident.outputs.window }}
          ERROR_FAILED: ${{ steps.incident.outputs.error_failed }}
          BURST: ${{ steps.incident.outputs.burst }}
          SOURCE_RUN_ID: ${{ steps.incident.outputs.run_id }}
          EVIDENCE_AVAILABLE: ${{ steps.incident.outputs.evidence_available }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const dedupKey = process.env.DEDUP_KEY;
            const title = process.env.ISSUE_TITLE;
            const status = process.env.STATUS;
            const action = process.env.ACTION;
            const reason = process.env.REASON;
            const window = process.env.WINDOW;
            const errorFailed = process.env.ERROR_FAILED;
            const burst = process.env.BURST;
            const sourceRunId = process.env.SOURCE_RUN_ID;
            const evidenceAvailable = process.env.EVIDENCE_AVAILABLE === "true";
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${sourceRunId}`;

            const marker = `<!-- ${dedupKey} -->`;
            const body = [
              marker,
              `## Ops Incident: Batch Telemetry Alert`,
              ``,
              `- status: \`${status}\``,
              `- action: \`${action}\``,
              `- reason: \`${reason}\``,
              `- lookback window: \`${window}\``,
              `- failed error count (5xx/unexpected): \`${errorFailed}\``,
              `- failure burst count: \`${burst}\``,
              `- source run: ${runUrl}`,
              `- evidence artifact available: \`${evidenceAvailable}\``,
              ``,
              `### Required actions`,
              `1. Validate reception impact on \`/calendar-next?view=reception\`.`,
              `2. Open telemetry evidence artifact from the source run${evidenceAvailable ? "." : " (missing in this occurrence; investigate workflow artifact path)."} `,
              `3. Complete the resolution template sections below before closing.`,
              `4. Update \`docs/AGENT_STATUS.md\` when incident is resolved.`,
              ``,
              `### Mitigation`,
              `- Immediate mitigation applied:`,
              `- Current service state:`,
              ``,
              `### Root Cause`,
              `- Root cause statement:`,
              `- Why detection happened:`,
              ``,
              `### Verification`,
              `- Validation steps executed:`,
              `- Evidence artifact / links:`,
              ``,
              `### Follow-up Actions`,
              `- [ ] Preventive change`,
              `- [ ] Monitoring/threshold update`,
              `- [ ] Runbook/status update (\`docs/AGENT_STATUS.md\`)`,
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "all",
              per_page: 100,
              labels: "ops,incident,batch-stats",
            });

            const openExisting = issues.find(
              (i) => i.state === "open" && (i.body || "").includes(marker),
            );
            if (openExisting) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: openExisting.number,
                body: [
                  `New occurrence detected from run ${runUrl}.`,
                  `status=\`${status}\`, reason=\`${reason}\`, errorFailed=\`${errorFailed}\`, burst=\`${burst}\`.`,
                ].join('\n'),
              });
              core.info(`Updated existing open issue #${openExisting.number}`);
              return;
            }

            const closedExisting = issues.find(
              (i) => i.state === "closed" && (i.body || "").includes(marker),
            );
            if (closedExisting) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: closedExisting.number,
                state: "open",
              });

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: closedExisting.number,
                body: [
                  `Incident reopened due to new occurrence from run ${runUrl}.`,
                  `status=\`${status}\`, reason=\`${reason}\`, errorFailed=\`${errorFailed}\`, burst=\`${burst}\`.`,
                ].join('\n'),
              });
              core.info(`Reopened existing issue #${closedExisting.number}`);
              return;
            }

            const created = await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
              labels: ["ops", "incident", "batch-stats"],
            });
            core.info(`Created issue #${created.data.number}`);
