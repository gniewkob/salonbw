name: Ops Batch Stats Incident Ticket

on:
  workflow_run:
    workflows: ["Ops Batch Stats Alerts"]
    types: [completed]
  workflow_dispatch:
    inputs:
      source_run_id:
        description: "Optional source run id to backfill from"
        required: false
      synthetic_fixture:
        description: "Optional synthetic evidence fixture: none|critical|degraded_observability|missing_evidence"
        required: false
        default: "none"
      dry_run:
        description: "When true, do not create/update/reopen/comment GitHub issues"
        required: false
        default: "false"

concurrency:
  group: ops-batch-stats-incident-ticket-${{ github.event.workflow_run.id || github.event.inputs.source_run_id || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read
  issues: write

jobs:
  incident-ticket:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'failure')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Resolve source run
        id: source
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.synthetic_fixture || 'none' }}" != "none" ]; then
            echo "run_id=synthetic-${{ github.run_id }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.source_run_id }}" ]; then
            echo "run_id=${{ github.event.inputs.source_run_id }}" >> "$GITHUB_OUTPUT"
          else
            echo "run_id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Preflight workflow inputs
        env:
          EVENT_NAME: ${{ github.event_name }}
          SOURCE_RUN_ID: ${{ github.event.inputs.source_run_id || '' }}
          SYNTHETIC_FIXTURE: ${{ github.event.inputs.synthetic_fixture || 'none' }}
          RESOLVED_RUN_ID: ${{ steps.source.outputs.run_id }}
        run: |
          set -euo pipefail

          case "$SYNTHETIC_FIXTURE" in
            none|critical|degraded_observability|missing_evidence) ;;
            *)
              echo "Invalid synthetic_fixture: $SYNTHETIC_FIXTURE"
              echo "Allowed values: none|critical|degraded_observability|missing_evidence"
              exit 1
              ;;
          esac

          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$SYNTHETIC_FIXTURE" = "none" ] && [ -z "$SOURCE_RUN_ID" ]; then
            echo "Invalid manual dispatch input: provide source_run_id or set synthetic_fixture to critical|degraded_observability|missing_evidence."
            exit 1
          fi

          if [ -z "$RESOLVED_RUN_ID" ]; then
            echo "Resolved source run id is empty."
            exit 1
          fi

      - name: Prepare synthetic evidence fixture
        id: synthetic
        if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.synthetic_fixture || 'none') != 'none' }}
        env:
          SYNTHETIC_FIXTURE: ${{ github.event.inputs.synthetic_fixture || 'none' }}
        run: |
          set -euo pipefail
          case "$SYNTHETIC_FIXTURE" in
            critical)
              cp scripts/fixtures/batch-telemetry-evidence-critical.json batch-telemetry-evidence.json
              echo "available=true" >> "$GITHUB_OUTPUT"
              ;;
            degraded_observability)
              cp scripts/fixtures/batch-telemetry-evidence-degraded-observability.json batch-telemetry-evidence.json
              echo "available=true" >> "$GITHUB_OUTPUT"
              ;;
            missing_evidence)
              rm -f batch-telemetry-evidence.json
              echo "available=false" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported synthetic fixture: $SYNTHETIC_FIXTURE"
              exit 1
              ;;
          esac

          if [ "$SYNTHETIC_FIXTURE" != "missing_evidence" ]; then
            jq -e . batch-telemetry-evidence.json >/dev/null
          fi

      - name: Download evidence artifact from source run
        id: evidence
        if: ${{ github.event_name != 'workflow_dispatch' || (github.event.inputs.synthetic_fixture || 'none') == 'none' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ steps.source.outputs.run_id }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "GitHub token is missing in workflow context."
            exit 1
          fi
          if ! echo "$RUN_ID" | grep -Eq '^[0-9]+$'; then
            echo "Resolved run id is not numeric: $RUN_ID"
            exit 1
          fi
          API="https://api.github.com/repos/${{ github.repository }}"
          GH_API_MAX_ATTEMPTS=6
          GH_API_BASE_DELAY_SECONDS=2

          github_api_get() {
            local url="$1"
            local output_path="$2"
            local attempt=1

            while (( attempt <= GH_API_MAX_ATTEMPTS )); do
              local headers_file body_file
              headers_file="$(mktemp)"
              body_file="$(mktemp)"

              local http_code
              http_code=$(
                curl -sS -L \
                  -D "$headers_file" \
                  -o "$body_file" \
                  -H "Authorization: Bearer ${GH_TOKEN}" \
                  -H "Accept: application/vnd.github+json" \
                  "$url" \
                  -w "%{http_code}"
              ) || http_code="000"

              if [[ "$http_code" =~ ^2[0-9]{2}$ ]]; then
                mv "$body_file" "$output_path"
                rm -f "$headers_file"
                return 0
              fi

              local remaining reset now sleep_for
              remaining=$(awk -F': ' 'tolower($1)=="x-ratelimit-remaining" {gsub("\r","",$2); print $2}' "$headers_file" | tail -n1)
              reset=$(awk -F': ' 'tolower($1)=="x-ratelimit-reset" {gsub("\r","",$2); print $2}' "$headers_file" | tail -n1)
              now=$(date +%s)
              sleep_for=$(( GH_API_BASE_DELAY_SECONDS * attempt ))

              if [[ "$http_code" == "403" && "$remaining" == "0" && "$reset" =~ ^[0-9]+$ ]]; then
                sleep_for=$(( reset - now + 2 ))
                if (( sleep_for < GH_API_BASE_DELAY_SECONDS )); then
                  sleep_for=$GH_API_BASE_DELAY_SECONDS
                fi
                echo "GitHub API rate-limit hit for ${url}. Waiting ${sleep_for}s before retry (attempt ${attempt}/${GH_API_MAX_ATTEMPTS})."
              else
                echo "GitHub API request failed for ${url} with HTTP ${http_code}. Retrying in ${sleep_for}s (attempt ${attempt}/${GH_API_MAX_ATTEMPTS})."
              fi

              rm -f "$headers_file" "$body_file"

              if (( attempt == GH_API_MAX_ATTEMPTS )); then
                return 1
              fi

              sleep "$sleep_for"
              attempt=$(( attempt + 1 ))
            done

            return 1
          }

          list_artifacts_json="$(mktemp)"
          if ! github_api_get "${API}/actions/runs/${RUN_ID}/artifacts" "$list_artifacts_json"; then
            echo "Failed to fetch artifacts list from GitHub API after retries"
            exit 1
          fi

          ARTIFACT_ID=$(
            cat "$list_artifacts_json" \
            | jq -r '.artifacts[] | select(.name | startswith("batch-telemetry-evidence-")) | .id' \
            | head -n1
          )
          rm -f "$list_artifacts_json"

          if [ -z "${ARTIFACT_ID}" ] || [ "${ARTIFACT_ID}" = "null" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "No evidence artifact found for run ${RUN_ID}; fallback mode enabled"
            exit 0
          fi

          if ! github_api_get "${API}/actions/artifacts/${ARTIFACT_ID}/zip" evidence.zip; then
            echo "Failed to download evidence artifact ${ARTIFACT_ID} after retries"
            exit 1
          fi

          unzip -o evidence.zip
          test -f batch-telemetry-evidence.json
          jq -e . batch-telemetry-evidence.json >/dev/null
          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Prepare incident payload
        id: incident
        env:
          RUN_ID: ${{ steps.source.outputs.run_id }}
          EVIDENCE_AVAILABLE: ${{ steps.synthetic.outputs.available || steps.evidence.outputs.available || 'false' }}
        run: |
          set -euo pipefail
          if [ "${EVIDENCE_AVAILABLE}" = "true" ]; then
            jq -e '
              ((.status|type)=="string") and
              ((.action|type)=="string") and
              ((.reason|type)=="string") and
              ((.config.lookbackWindow|type)=="string") and
              ((.counts.failedError5xxOrUnexpected|type)=="number" or .counts.failedError5xxOrUnexpected == null) and
              ((.counts.failureBurstError|type)=="number" or .counts.failureBurstError == null)
            ' batch-telemetry-evidence.json >/dev/null

            STATUS=$(jq -r '.status' batch-telemetry-evidence.json)
            ACTION=$(jq -r '.action' batch-telemetry-evidence.json)
            REASON=$(jq -r '.reason' batch-telemetry-evidence.json)
            WINDOW=$(jq -r '.config.lookbackWindow' batch-telemetry-evidence.json)
            ERROR_FAILED=$(jq -r '.counts.failedError5xxOrUnexpected // 0' batch-telemetry-evidence.json)
            BURST=$(jq -r '.counts.failureBurstError // 0' batch-telemetry-evidence.json)
          else
            STATUS="critical"
            ACTION="investigate-artifact-gap"
            REASON="missing_evidence_artifact"
            WINDOW="unknown"
            ERROR_FAILED="0"
            BURST="0"
          fi

          DATE_KEY=$(date -u +%Y-%m-%d)
          REASON_KEY=$(printf "%s" "$REASON" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9._-' '-')

          TITLE="[OPS][batch-stats] ${STATUS} ${REASON} (${DATE_KEY})"
          DEDUP_KEY="ops-batch-stats|${REASON_KEY}|${DATE_KEY}"

          if [ "${#TITLE}" -gt 240 ]; then
            TITLE="${TITLE:0:237}..."
          fi

          {
            echo "title=${TITLE}"
            echo "dedup_key=${DEDUP_KEY}"
            echo "status=${STATUS}"
            echo "action=${ACTION}"
            echo "reason=${REASON}"
            echo "window=${WINDOW}"
            echo "error_failed=${ERROR_FAILED}"
            echo "burst=${BURST}"
            echo "run_id=${RUN_ID}"
            echo "evidence_available=${EVIDENCE_AVAILABLE:-false}"
          } >> "$GITHUB_OUTPUT"

      - name: Validate incident issue quality payload
        env:
          ISSUE_TITLE: ${{ steps.incident.outputs.title }}
          DEDUP_KEY: ${{ steps.incident.outputs.dedup_key }}
          STATUS: ${{ steps.incident.outputs.status }}
          ACTION: ${{ steps.incident.outputs.action }}
          REASON: ${{ steps.incident.outputs.reason }}
          WINDOW: ${{ steps.incident.outputs.window }}
          EVIDENCE_AVAILABLE: ${{ steps.incident.outputs.evidence_available }}
        run: |
          set -euo pipefail

          test -n "${ISSUE_TITLE}"
          test -n "${DEDUP_KEY}"
          test -n "${STATUS}"
          test -n "${ACTION}"
          test -n "${REASON}"
          test -n "${WINDOW}"
          test -n "${EVIDENCE_AVAILABLE}"

          case "${STATUS}" in
            critical|warning|degraded_observability|ok|config_error) ;;
            *)
              echo "Unsupported status: ${STATUS}"
              exit 1
              ;;
          esac

          if ! echo "${DEDUP_KEY}" | grep -Eq '^ops-batch-stats\|[a-z0-9._-]+\|[0-9]{4}-[0-9]{2}-[0-9]{2}$'; then
            echo "Invalid dedup key format: ${DEDUP_KEY}"
            exit 1
          fi

          if ! echo "${ISSUE_TITLE}" | grep -q '^\[OPS\]\[batch-stats\] '; then
            echo "Invalid title prefix: ${ISSUE_TITLE}"
            exit 1
          fi

      - name: Create or update incident issue
        uses: actions/github-script@v7
        env:
          ISSUE_TITLE: ${{ steps.incident.outputs.title }}
          DEDUP_KEY: ${{ steps.incident.outputs.dedup_key }}
          STATUS: ${{ steps.incident.outputs.status }}
          ACTION: ${{ steps.incident.outputs.action }}
          REASON: ${{ steps.incident.outputs.reason }}
          WINDOW: ${{ steps.incident.outputs.window }}
          ERROR_FAILED: ${{ steps.incident.outputs.error_failed }}
          BURST: ${{ steps.incident.outputs.burst }}
          SOURCE_RUN_ID: ${{ steps.incident.outputs.run_id }}
          EVIDENCE_AVAILABLE: ${{ steps.incident.outputs.evidence_available }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        with:
          script: |
            async function sleep(ms) {
              return new Promise((resolve) => setTimeout(resolve, ms));
            }

            async function withGithubRetry(fn, label) {
              const maxAttempts = 6;
              const baseDelayMs = 2000;

              for (let attempt = 1; attempt <= maxAttempts; attempt += 1) {
                try {
                  return await fn();
                } catch (error) {
                  const status = error?.status;
                  const message = String(error?.message || "");
                  const headers = error?.response?.headers || {};
                  const isRateLimit =
                    status === 429 ||
                    (status === 403 &&
                      (message.toLowerCase().includes("rate limit") ||
                        message.toLowerCase().includes("secondary rate limit")));
                  const isTransient =
                    status === 502 || status === 503 || status === 504 || status === 500;
                  const retriable = isRateLimit || isTransient;

                  if (!retriable || attempt === maxAttempts) {
                    throw error;
                  }

                  let delayMs = baseDelayMs * attempt;
                  const resetRaw = headers["x-ratelimit-reset"];
                  if (isRateLimit && resetRaw && /^\d+$/.test(String(resetRaw))) {
                    const resetEpochMs = Number(resetRaw) * 1000;
                    const nowMs = Date.now();
                    delayMs = Math.max(resetEpochMs - nowMs + 2000, delayMs);
                  }

                  core.warning(
                    `${label} failed with status=${status ?? "unknown"} on attempt ${attempt}/${maxAttempts}. Retrying in ${Math.ceil(delayMs / 1000)}s.`,
                  );
                  await sleep(delayMs);
                }
              }
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const dedupKey = process.env.DEDUP_KEY;
            const title = process.env.ISSUE_TITLE;
            const status = process.env.STATUS;
            const action = process.env.ACTION;
            const reason = process.env.REASON;
            const window = process.env.WINDOW;
            const errorFailed = process.env.ERROR_FAILED;
            const burst = process.env.BURST;
            const sourceRunId = process.env.SOURCE_RUN_ID;
            const evidenceAvailable = process.env.EVIDENCE_AVAILABLE === "true";
            const dryRun = String(process.env.DRY_RUN || "false").toLowerCase() === "true";
            const sourceEvent = context.eventName;
            const workflowName = process.env.GITHUB_WORKFLOW || "Ops Batch Stats Incident Ticket";
            const workflowRunId = process.env.GITHUB_RUN_ID || "unknown";
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${sourceRunId}`;
            const automationMarker = `<!-- ops-automation:incident-ticket:${workflowRunId}:${dedupKey} -->`;

            const marker = `<!-- ${dedupKey} -->`;
            const body = [
              marker,
              automationMarker,
              `## Ops Incident: Batch Telemetry Alert`,
              ``,
              `- status: \`${status}\``,
              `- action: \`${action}\``,
              `- reason: \`${reason}\``,
              `- lookback window: \`${window}\``,
              `- failed error count (5xx/unexpected): \`${errorFailed}\``,
              `- failure burst count: \`${burst}\``,
              `- source run: ${runUrl}`,
              `- evidence artifact available: \`${evidenceAvailable}\``,
              `- workflow: \`${workflowName}\``,
              `- workflow run id: \`${workflowRunId}\``,
              `- source event: \`${sourceEvent}\``,
              `- dry run: \`${dryRun}\``,
              ``,
              `### Required actions`,
              `1. Validate reception impact on \`/calendar-next?view=reception\`.`,
              `2. Open telemetry evidence artifact from the source run${evidenceAvailable ? "." : " (missing in this occurrence; investigate workflow artifact path)."} `,
              `3. Complete the resolution template sections below before closing.`,
              `4. Update \`docs/AGENT_STATUS.md\` when incident is resolved.`,
              ``,
              `### Mitigation`,
              `- Immediate mitigation applied:`,
              `- Current service state:`,
              ``,
              `### Root Cause`,
              `- Root cause statement:`,
              `- Why detection happened:`,
              ``,
              `### Verification`,
              `- Validation steps executed:`,
              `- Evidence artifact / links:`,
              ``,
              `### Follow-up Actions`,
              `- [ ] Preventive change`,
              `- [ ] Monitoring/threshold update`,
              `- [ ] Runbook/status update (\`docs/AGENT_STATUS.md\`)`,
            ].join('\n');

            const { data: issues } = await withGithubRetry(
              () =>
                github.rest.issues.listForRepo({
                  owner,
                  repo,
                  state: "all",
                  per_page: 100,
                  labels: "ops,incident,batch-stats",
                }),
              "issues.listForRepo",
            );

            const openExisting = issues.find(
              (i) => i.state === "open" && (i.body || "").includes(marker),
            );
            if (openExisting) {
              if (dryRun) {
                core.notice(`DRY_RUN: would add occurrence comment to open issue #${openExisting.number}`);
                core.summary
                  .addHeading("Incident Ticket Dry Run")
                  .addRaw(`Action: comment on existing open issue #${openExisting.number}\n`)
                  .addRaw(`Run: ${runUrl}\n`)
                  .write();
                return;
              }

              await withGithubRetry(
                () =>
                  github.rest.issues.createComment({
                    owner,
                    repo,
                    issue_number: openExisting.number,
                    body: [
                      automationMarker,
                      `New occurrence detected from run ${runUrl}.`,
                      `status=\`${status}\`, reason=\`${reason}\`, errorFailed=\`${errorFailed}\`, burst=\`${burst}\`.`,
                      `workflow=\`${workflowName}\`, workflow_run_id=\`${workflowRunId}\`, dedup_key=\`${dedupKey}\`, source_event=\`${sourceEvent}\`, dry_run=\`${dryRun}\`.`,
                    ].join('\n'),
                  }),
                "issues.createComment(openExisting)",
              );
              core.info(`Updated existing open issue #${openExisting.number}`);
              return;
            }

            const closedExisting = issues.find(
              (i) => i.state === "closed" && (i.body || "").includes(marker),
            );
            if (closedExisting) {
              if (dryRun) {
                core.notice(`DRY_RUN: would reopen closed issue #${closedExisting.number} and add occurrence comment`);
                core.summary
                  .addHeading("Incident Ticket Dry Run")
                  .addRaw(`Action: reopen + comment on issue #${closedExisting.number}\n`)
                  .addRaw(`Run: ${runUrl}\n`)
                  .write();
                return;
              }

              await withGithubRetry(
                () =>
                  github.rest.issues.update({
                    owner,
                    repo,
                    issue_number: closedExisting.number,
                    state: "open",
                  }),
                "issues.update(reopen)",
              );

              await withGithubRetry(
                () =>
                  github.rest.issues.createComment({
                    owner,
                    repo,
                    issue_number: closedExisting.number,
                    body: [
                      automationMarker,
                      `Incident reopened due to new occurrence from run ${runUrl}.`,
                      `status=\`${status}\`, reason=\`${reason}\`, errorFailed=\`${errorFailed}\`, burst=\`${burst}\`.`,
                      `workflow=\`${workflowName}\`, workflow_run_id=\`${workflowRunId}\`, dedup_key=\`${dedupKey}\`, source_event=\`${sourceEvent}\`, dry_run=\`${dryRun}\`.`,
                    ].join('\n'),
                  }),
                "issues.createComment(closedExisting)",
              );
              core.info(`Reopened existing issue #${closedExisting.number}`);
              return;
            }

            if (dryRun) {
              core.notice("DRY_RUN: would create a new incident issue");
              core.summary
                .addHeading("Incident Ticket Dry Run")
                .addRaw(`Action: create new issue\n`)
                .addRaw(`Title: ${title}\n`)
                .addRaw(`Dedup key: ${dedupKey}\n`)
                .addRaw(`Run: ${runUrl}\n`)
                .write();
              return;
            }

            const created = await withGithubRetry(
              () =>
                github.rest.issues.create({
                  owner,
                  repo,
                  title,
                  body,
                  labels: ["ops", "incident", "batch-stats"],
                }),
              "issues.create",
            );
            core.info(`Created issue #${created.data.number}`);
