name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

env:
  PNPM_VERSION: 10.14.0
  NODE_VERSION: "22"

jobs:
  frontend:
    name: Frontend (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [public, dashboard, admin]
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v4

      - name: Detect changed paths
        id: paths
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          list-files: none
          filters: |
            public:
              - 'apps/landing/src/pages/index.tsx'
              - 'apps/landing/src/pages/services.tsx'
              - 'apps/landing/src/pages/gallery.tsx'
              - 'apps/landing/src/pages/contact.tsx'
              - 'apps/landing/public/**'
              - 'apps/landing/next.config.mjs'
              - 'apps/landing/package.json'
              - 'apps/landing/tsconfig.json'
              - 'apps/landing/**/*.ts'
              - 'apps/landing/**/*.tsx'
              - 'apps/landing/**/*.js'
              - 'apps/landing/**/*.jsx'
              - 'apps/landing/**/*.json'
            dashboard:
              - 'apps/panel/src/pages/dashboard/**'
              - 'apps/panel/src/components/**'
              - 'apps/panel/src/hooks/**'
              - 'apps/panel/src/contexts/**'
              - 'apps/panel/next.config.mjs'
              - 'apps/panel/package.json'
              - 'apps/panel/tsconfig.json'
              - 'apps/panel/**/*.ts'
              - 'apps/panel/**/*.tsx'
              - 'apps/panel/**/*.js'
              - 'apps/panel/**/*.jsx'
              - 'apps/panel/**/*.json'
            admin:
              - 'apps/panel/src/pages/dashboard/admin/**'
              - 'apps/panel/src/pages/dashboard/services/**'
              - 'apps/panel/src/pages/dashboard/receptionist/**'
              - 'apps/panel/src/pages/dashboard/employee/**'
              - 'apps/panel/src/pages/dashboard/client/**'
              - 'apps/panel/src/components/**'
              - 'apps/panel/src/hooks/**'
              - 'apps/panel/src/contexts/**'
              - 'apps/panel/next.config.mjs'
              - 'apps/panel/package.json'
              - 'apps/panel/tsconfig.json'
              - 'apps/panel/**/*.ts'
              - 'apps/panel/**/*.tsx'
              - 'apps/panel/**/*.js'
              - 'apps/panel/**/*.jsx'
              - 'apps/panel/**/*.json'

      - name: Decide if job should run
        id: should_run
        run: |
          if [[ "$EVENT_NAME" == "push" && "$REF" == "refs/heads/main" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif [[ "$APP_CHANGED" == "true" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "No relevant changes detected for ${APP_NAME} – skipping." >> "$GITHUB_STEP_SUMMARY"
          fi
        env:
          APP_CHANGED: ${{ steps.paths.outputs[matrix.app] }}
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          APP_NAME: ${{ matrix.app }}

      - name: Resolve API URL
        if: steps.should_run.outputs.run == 'true'
        id: api
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "api_url=https://api.salon-bw.pl" >> "$GITHUB_OUTPUT"
          else
            echo "api_url=/api" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        if: steps.should_run.outputs.run == 'true'
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node
        if: steps.should_run.outputs.run == 'true'
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Configure npm registry
        run: |
          if [ -n "${{ secrets.NPM_TOKEN }}" ]; then
            echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" >> ~/.npmrc
          fi

      - name: Install dependencies
        if: steps.should_run.outputs.run == 'true'
        run: pnpm install --frozen-lockfile

      - name: Lint
        if: steps.should_run.outputs.run == 'true'
        run: |
          if [ "$APP" == "public" ]; then
            FILTER="@salonbw/landing"
          else
            FILTER="@salonbw/panel"
          fi
          pnpm turbo run lint --filter="$FILTER" --cache-dir=.turbo
        env:
          APP: ${{ matrix.app }}

      - name: Typecheck and build
        if: steps.should_run.outputs.run == 'true'
        run: |
          if [ "$APP" == "public" ]; then
            FILTER="@salonbw/landing"
          else
            FILTER="@salonbw/panel"
          fi
          pnpm turbo run typecheck build --filter="$FILTER" --cache-dir=.turbo
        env:
          APP: ${{ matrix.app }}
          NEXT_PUBLIC_API_URL: ${{ steps.api.outputs.api_url }}

  backend:
    name: Backend API
    runs-on: ubuntu-latest
    needs: frontend
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Configure npm registry
        run: |
          if [ -n "${{ secrets.NPM_TOKEN }}" ]; then
            echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" >> ~/.npmrc
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint backend
        run: pnpm turbo run lint --filter=salonbw-backend --cache-dir=.turbo

      - name: Typecheck and build backend
        run: pnpm turbo run typecheck build --filter=salonbw-backend --cache-dir=.turbo

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit (fail on high/critical only)
        run: pnpm audit --audit-level=high --ignore-unfixable

  secret-scan:
    name: Secret Hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v4

      - name: Scan tracked files for likely secrets
        shell: bash
        run: |
          set -euo pipefail
          if rg -n --hidden --no-ignore-vcs \
            --glob '!.git/**' \
            --glob '!**/*.lock' \
            --glob '!**/pnpm-lock.yaml' \
            --glob '!**/package-lock.json' \
            --glob '!**/*.svg' \
            --glob '!**/*.png' \
            --glob '!**/*.jpg' \
            --glob '!**/*.jpeg' \
            --glob '!**/*.webp' \
            --glob '!**/*.map' \
            '(-----BEGIN ([A-Z0-9]+ )?PRIVATE KEY-----|AKIA[0-9A-Z]{16}|ghp_[A-Za-z0-9]{36,}|github_pat_[A-Za-z0-9_]{40,}|AIza[0-9A-Za-z_-]{35}|xox[baprs]-[A-Za-z0-9-]{10,}|postgres(ql)?://[^[:space:]]+:[^[:space:]]+@|JWT_SECRET=|JWT_REFRESH_SECRET=|SMTP_PASSWORD=|ADMIN_PASSWORD=|MYDEVIL_SSH_KEY=|SSH_PRIVATE_KEY=)' \
            .; then
            echo "Potential secret material found in tracked files" >&2
            exit 1
          fi

# cspell:ignore GITHUB npmjs github elif
