name: Add Test Data

on:
  workflow_dispatch:

jobs:
  add-test-data:
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install axios
        working-directory: backend/salonbw-backend

      - name: Add test data via API
        env:
          API_URL: ${{ secrets.API_URL || 'https://api.salon-bw.pl' }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          if [ -z "$ADMIN_EMAIL" ] || [ -z "$ADMIN_PASSWORD" ]; then
            echo "Missing required secrets: ADMIN_EMAIL and/or ADMIN_PASSWORD"
            exit 1
          fi
          API_BASE="$API_URL" node scripts/add-test-data.js
        working-directory: backend/salonbw-backend
