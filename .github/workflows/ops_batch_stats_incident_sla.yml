name: Ops Batch Stats Incident SLA

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "When true, do not post SLA reminder comments"
        required: false
        default: "false"
  schedule:
    - cron: '7 * * * *'

concurrency:
  group: ops-batch-stats-incident-sla
  cancel-in-progress: false

permissions:
  issues: write
  contents: read

jobs:
  sla-reminder:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: SLA reminder for stale incident issues
        uses: actions/github-script@v7
        env:
          SLA_HOURS: "6"
          LABELS: "ops,incident,batch-stats"
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const slaHours = Number(process.env.SLA_HOURS || "6");
            const labels = process.env.LABELS || "ops,incident,batch-stats";
            const dryRun = String(process.env.DRY_RUN || "false").toLowerCase() === "true";
            const now = new Date();
            const cutoff = new Date(now.getTime() - slaHours * 60 * 60 * 1000);
            const dayMarker = `<!-- sla-reminder:${now.toISOString().slice(0, 10)} -->`;
            const workflowName = process.env.GITHUB_WORKFLOW || "Ops Batch Stats Incident SLA";
            const workflowRunId = process.env.GITHUB_RUN_ID || "unknown";
            const sourceEvent = context.eventName;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              labels,
              per_page: 100,
            });

            let remindedCount = 0;
            let checkedCount = 0;
            let plannedCount = 0;

            for (const issue of issues) {
              checkedCount += 1;
              const body = issue.body || "";
              if (!body.includes("ops-batch-stats|")) {
                continue;
              }

              const updatedAt = new Date(issue.updated_at);
              if (updatedAt >= cutoff) {
                continue;
              }

              const { data: comments } = await github.rest.issues.listComments({
                owner,
                repo,
                issue_number: issue.number,
                per_page: 100,
              });

              const hasTodayReminder = comments.some((c) =>
                (c.body || "").includes(dayMarker),
              );
              if (hasTodayReminder) {
                continue;
              }

              if (dryRun) {
                plannedCount += 1;
                core.notice(`DRY_RUN: would post SLA reminder on issue #${issue.number}`);
                continue;
              }

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: [
                  dayMarker,
                  `<!-- ops-automation:incident-sla:${workflowRunId}:issue-${issue.number} -->`,
                  `SLA reminder: this incident is open and inactive for more than ${slaHours}h.`,
                  `Please update mitigation/progress or close if resolved.`,
                  `workflow=\`${workflowName}\`, workflow_run_id=\`${workflowRunId}\`, source_event=\`${sourceEvent}\`, dry_run=\`${dryRun}\`.`,
                ].join("\n"),
              });
              remindedCount += 1;
            }

            core.summary
              .addHeading("Batch Stats Incident SLA")
              .addRaw(`Checked open issues: ${checkedCount}\n`)
              .addRaw(`Dry run mode: ${dryRun}\n`)
              .addRaw(`Reminders planned: ${plannedCount}\n`)
              .addRaw(`Reminders posted: ${remindedCount}\n`)
              .addRaw(`SLA threshold (hours): ${slaHours}\n`)
              .write();
