name: E2E Playwright Regression

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - 'apps/panel/src/**'
      - 'apps/panel/tests/e2e/regression/**'
      - 'apps/panel/tests/e2e/helpers/**'
      - 'apps/panel/playwright.config.ts'

env:
  PNPM_VERSION: 10.14.0
  NODE_VERSION: '22'
  CI: true

jobs:
  playwright-regression:
    name: Playwright Regression (panel)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify required secrets
        id: secrets
        run: |
          missing=()
          for var in E2E_ADMIN_EMAIL E2E_ADMIN_PASSWORD E2E_CLIENT_EMAIL E2E_CLIENT_PASSWORD E2E_BASE_URL; do
            if [ -z "${!var}" ]; then
              missing+=("$var")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing secrets/vars: %s\n' "${missing[@]}"
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Required E2E vars missing – skipping Playwright run." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_CLIENT_EMAIL: ${{ secrets.E2E_CLIENT_EMAIL }}
          E2E_CLIENT_PASSWORD: ${{ secrets.E2E_CLIENT_PASSWORD }}
          E2E_BASE_URL: ${{ vars.E2E_BASE_URL }}

      - name: Setup Node
        if: steps.secrets.outputs.available == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        if: steps.secrets.outputs.available == 'true'
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Install dependencies
        if: steps.secrets.outputs.available == 'true'
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        if: steps.secrets.outputs.available == 'true'
        run: pnpm --filter "@salonbw/panel" exec playwright install chromium --with-deps

      - name: Run Playwright regression suite
        if: steps.secrets.outputs.available == 'true'
        run: |
          pnpm --filter "@salonbw/panel" exec playwright test \
            tests/e2e/regression/ \
            --project=regression \
            --reporter=list
        env:
          PLAYWRIGHT_BASE_URL: ${{ vars.E2E_BASE_URL }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_CLIENT_EMAIL: ${{ secrets.E2E_CLIENT_EMAIL }}
          E2E_CLIENT_PASSWORD: ${{ secrets.E2E_CLIENT_PASSWORD }}

      - name: Upload Playwright traces (on failure)
        if: steps.secrets.outputs.available == 'true' && failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: apps/panel/test-results/
          if-no-files-found: ignore
