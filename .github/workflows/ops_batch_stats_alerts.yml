name: Ops Batch Stats Alerts

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch: {}
  schedule:
    - cron: '*/10 * * * *'

concurrency:
  group: ops-batch-stats-alerts
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  check-batch-telemetry:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tooling
        run: |
          set -euo pipefail
          jq --version
          curl --version

      - name: Preflight telemetry configuration
        env:
          LOKI_QUERY_URL: ${{ secrets.LOKI_QUERY_URL }}
          LOKI_BASIC_AUTH: ${{ secrets.LOKI_BASIC_AUTH }}
          FAIL_ON_OBSERVABILITY_GAP: 0
        run: |
          set -euo pipefail
          if [ -z "${LOKI_QUERY_URL:-}" ]; then
            echo "LOKI_QUERY_URL not set in secrets; default endpoint fallback will be used."
          fi

          if [ -z "${LOKI_BASIC_AUTH:-}" ]; then
            echo "LOKI_BASIC_AUTH not set; check will run in degraded_observability mode unless FAIL_ON_OBSERVABILITY_GAP=1."
          fi

          if ! echo "${FAIL_ON_OBSERVABILITY_GAP}" | grep -Eq '^(0|1)$'; then
            echo "FAIL_ON_OBSERVABILITY_GAP must be 0 or 1."
            exit 1
          fi

      - name: Evaluate reception batch telemetry signals
        env:
          LOKI_QUERY_URL: ${{ secrets.LOKI_QUERY_URL }}
          LOKI_BASIC_AUTH: ${{ secrets.LOKI_BASIC_AUTH }}
          LOOKBACK_WINDOW: 10m
          CRITICAL_ERROR_THRESHOLD: 3
          LOKI_QUERY_TIMEOUT_SECONDS: 12
          FAIL_ON_OBSERVABILITY_GAP: 0
          EVIDENCE_PATH: batch-telemetry-evidence.json
        run: |
          set -euo pipefail
          if [ -z "${LOKI_QUERY_URL}" ]; then
            export LOKI_QUERY_URL="https://observability.salon-bw.pl/loki/api/v1/query"
          fi
          ./scripts/check-batch-telemetry-alerts.sh

      - name: Validate telemetry evidence schema
        if: always()
        run: |
          set -euo pipefail
          test -f batch-telemetry-evidence.json
          jq -e '
            ((.generatedAt|type)=="string") and
            ((.status|type)=="string") and
            ((.action|type)=="string") and
            ((.reason|type)=="string") and
            ((.config|type)=="object") and
            ((.counts|type)=="object") and
            ((.failedQueries|type)=="array") and
            ((.queries|type)=="object") and
            ((.exitCode|type)=="number") and
            (.queries | has("slow") and has("failedWarn") and has("failedError") and has("burst"))
          ' batch-telemetry-evidence.json >/dev/null

      - name: Upload telemetry evidence artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: batch-telemetry-evidence-${{ github.run_id }}
          path: batch-telemetry-evidence.json
          if-no-files-found: warn
          retention-days: 14
