name: Ops Batch Stats Incident Closure Guard

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  issues:
    types: [closed]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Optional issue number for manual validation"
        required: false
      dry_run:
        description: "When true, do not reopen issue or add comments"
        required: false
        default: "false"

concurrency:
  group: ops-batch-stats-closure-guard-${{ github.event.issue.number || github.event.inputs.issue_number || github.run_id }}
  cancel-in-progress: false

permissions:
  issues: write
  contents: read

jobs:
  closure-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Validate closure quality and reopen if required
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const dryRun = String(context.payload.inputs?.dry_run || "false").toLowerCase() === "true";
            const workflowName = process.env.GITHUB_WORKFLOW || "Ops Batch Stats Incident Closure Guard";
            const workflowRunId = process.env.GITHUB_RUN_ID || "unknown";
            const sourceEvent = context.eventName;

            const issueNumberInput = context.payload.inputs?.issue_number;
            const issueNumber = issueNumberInput
              ? Number(issueNumberInput)
              : context.payload.issue?.number;

            if (!issueNumber || Number.isNaN(issueNumber)) {
              core.info("No issue number provided; skipping.");
              return;
            }

            const { data: issue } = await github.rest.issues.get({
              owner,
              repo,
              issue_number: issueNumber,
            });

            const labels = (issue.labels || []).map((l) =>
              typeof l === "string" ? l : l.name,
            );
            const requiredLabels = ["ops", "incident", "batch-stats"];
            const isBatchIncident = requiredLabels.every((name) => labels.includes(name));
            if (!isBatchIncident) {
              core.info(`Issue #${issue.number} is not a batch incident; skipping.`);
              return;
            }

            if (issue.state !== "closed") {
              core.info(`Issue #${issue.number} is not closed; skipping.`);
              return;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: issue.number,
              per_page: 100,
            });

            const combinedText = [
              issue.body || "",
              ...comments.map((c) => c.body || ""),
            ]
              .join("\n")
              .toLowerCase();

            const hasRootCause =
              combinedText.includes("root cause") || combinedText.includes("root-cause");
            const hasMitigation = combinedText.includes("mitigation");

            if (hasRootCause && hasMitigation) {
              core.info(`Issue #${issue.number} has closure evidence.`);
              return;
            }

            const missing = [];
            if (!hasRootCause) missing.push("root cause");
            if (!hasMitigation) missing.push("mitigation");

            if (dryRun) {
              core.notice(`DRY_RUN: would reopen issue #${issue.number} and add closure-guard comment (missing: ${missing.join(", ")})`);
              core.summary
                .addHeading("Batch Stats Incident Closure Guard")
                .addRaw(`Dry run mode: true\n`)
                .addRaw(`Issue number: #${issue.number}\n`)
                .addRaw(`Missing closure evidence: ${missing.join(", ")}\n`)
                .write();
              core.setOutput("reopened", "false");
              return;
            }

            await github.rest.issues.update({
              owner,
              repo,
              issue_number: issue.number,
              state: "open",
            });

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issue.number,
              body: [
                "<!-- closure-guard-reopen -->",
                `<!-- ops-automation:incident-closure-guard:${workflowRunId}:issue-${issue.number} -->`,
                "Incident closure guard reopened this issue.",
                `Missing closure evidence: ${missing.join(", ")}.`,
                "Please add mitigation and root cause notes, then close again.",
                `workflow=\`${workflowName}\`, workflow_run_id=\`${workflowRunId}\`, source_event=\`${sourceEvent}\`, dry_run=\`${dryRun}\`.`,
              ].join("\n"),
            });

            core.setOutput("reopened", "true");
